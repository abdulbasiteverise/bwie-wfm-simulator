<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>BWIE Workforce Intelligence Engine</title>

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<header>

<h1>BWIE</h1>

<p>Basit Workforce Intelligence Engine</p>

</header>


<section>

<h2>Inputs</h2>

<label>Call Volume (CSV)</label>

<textarea id="volumeInput">50,75,100,120,140,150,160,155,150,145,140,135</textarea>

<label>Agent Staffing (CSV)</label>

<textarea id="staffInput">20,20,25,25,30,30,30,30,28,28,26,26</textarea>

<label>Average Handle Time (seconds)</label>

<input id="ahtInput" type="number" value="240">

<label>Customer Patience (seconds)</label>

<input id="patienceInput" type="number" value="120">

<label>Shrinkage %</label>

<input id="shrinkInput" type="number" value="15">

<label>SLA Threshold (seconds)</label>

<input id="slaInput" type="number" value="20">

<button id="runBtn">Run Simulation</button>

<button id="optimizeBtn">Optimize Staffing</button>

<button id="reforecastBtn">Intraday Reforecast</button>

<button id="monteBtn">Monte Carlo Risk</button>

</section>


<section>

<h2>KPI Dashboard</h2>

<div class="grid">

<div class="metric">
<h3 id="slaMetric">--</h3>
<p>SLA</p>
</div>

<div class="metric">
<h3 id="occMetric">--</h3>
<p>Occupancy</p>
</div>

<div class="metric">
<h3 id="queueMetric">--</h3>
<p>Avg Queue</p>
</div>

<div class="metric">
<h3 id="abnMetric">--</h3>
<p>Abandon %</p>
</div>

</div>

</section>


<section>

<h2>Operational Insights</h2>

<div id="insightBox"></div>

</section>


<section>

<h2>Charts</h2>

<canvas id="volumeChart"></canvas>

<canvas id="slaChart"></canvas>

</section>


<section>

<h2>Interval Results</h2>

<div id="intervalTable"></div>

</section>


<footer>

BWIE Simulation Lab — Abdul Basit

</footer>

</div>

<script src="script.js"></script>

</body>

</html>
